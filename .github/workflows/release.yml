name: Release

on:
  push:
    tags:
      - '*.*.*'

env:
  GODOT_VERSION: "4.6"

jobs:
  export:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_macos.universal.zip
          unzip -q Godot_v${GODOT_VERSION}-stable_macos.universal.zip
          sudo cp -R Godot.app /Applications/Godot.app
          sudo ln -s /Applications/Godot.app/Contents/MacOS/Godot /usr/local/bin/godot

      - name: Install export templates
        run: |
          mkdir -p ~/Library/Application\ Support/Godot/export_templates/${GODOT_VERSION}.stable
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          unzip -q Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          mv templates/* ~/Library/Application\ Support/Godot/export_templates/${GODOT_VERSION}.stable/

      - name: Disable macOS codesigning for CI
        run: |
          sed -i '' 's|codesign/codesign=3|codesign/codesign=0|' export_presets.cfg
          sed -i '' 's|export/distribution_type=1|export/distribution_type=0|' export_presets.cfg

      - name: Import project
        run: godot --headless --import 2>&1 || true

      - name: Export Windows
        run: |
          mkdir -p build/windows
          godot --headless --export-release "Windows Desktop" build/windows/ArtRoulette.exe

      - name: Export macOS
        run: |
          mkdir -p build/macos
          godot --headless --export-release "macOS" build/macos/ArtRoulette.zip
          cd build/macos
          unzip -q ArtRoulette.zip
          rm ArtRoulette.zip
          codesign --force --deep --sign - ArtRoulette.app
          zip -r -y ArtRoulette.zip ArtRoulette.app
          cd ../..

      - name: Export Linux
        run: |
          mkdir -p build/linux
          godot --headless --export-release "Linux" build/linux/ArtRoulette.x86_64

      - name: Package artifacts
        run: |
          cd build/windows && zip -r ../../ArtRoulette-Windows.zip . && cd ../..
          mv build/macos/ArtRoulette.zip ArtRoulette-macOS.zip
          cd build/linux && zip -r ../../ArtRoulette-Linux.zip . && cd ../..

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ArtRoulette-Windows.zip
            ArtRoulette-macOS.zip
            ArtRoulette-Linux.zip
          generate_release_notes: true
          append_body: true
          body: |
            ### macOS note
            The macOS build is unsigned. Right-click and select "Open" the first time to bypass Gatekeeper.
