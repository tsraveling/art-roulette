name: Release

on:
  push:
    tags:
      - '*.*.*'

env:
  GODOT_VERSION: "4.6"

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          unzip -q Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          sudo mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Install export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          unzip -q Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Import project
        run: godot --headless --import 2>&1 || true

      - name: Export Windows
        run: |
          mkdir -p build/windows
          godot --headless --export-release "Windows Desktop" build/windows/ArtRoulette.exe

      - name: Disable macOS codesigning for CI
        run: |
          sed -i 's|codesign/codesign=3|codesign/codesign=0|' export_presets.cfg

      - name: Export macOS
        run: |
          mkdir -p build/macos
          godot --headless --export-release "macOS" build/macos/ArtRoulette.zip

      - name: Export Linux
        run: |
          mkdir -p build/linux
          godot --headless --export-release "Linux" build/linux/ArtRoulette.x86_64

      - name: Package artifacts
        run: |
          cd build/windows && zip -r ../../ArtRoulette-Windows.zip . && cd ../..
          mv build/macos/ArtRoulette.zip ArtRoulette-macOS.zip
          cd build/linux && zip -r ../../ArtRoulette-Linux.zip . && cd ../..

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ArtRoulette-Windows.zip
            ArtRoulette-macOS.zip
            ArtRoulette-Linux.zip
          generate_release_notes: true
